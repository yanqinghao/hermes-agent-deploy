services:
  hermes:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "${HERMES_GATEWAY_PORT:-8642}:8642"
    volumes:
      - ${HOME}/.hermes:/opt/data
    shm_size: "1gb"
    networks:
      - hermes-net

  dashboard:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0 --insecure
    ports:
      - "${HERMES_DASHBOARD_PORT:-9119}:9119"
    volumes:
      - ${HOME}/.hermes:/opt/data
    environment:
      GATEWAY_HEALTH_URL: ${GATEWAY_HEALTH_URL:-http://hermes:8642}
    depends_on:
      - hermes
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge
